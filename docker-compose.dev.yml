# Dev overrides — layered on top of docker-compose.yml via run.sh.
#
# Each stack (warehouse, store) applies this override on top of the base
# compose. Bind-mounts the repo into each container so edits are live;
# runs npm install + dev server instead of the prod CMD. A named volume
# per compose project keeps the two stacks' node_modules separate.

services:
  backend:
    volumes:
      - ./:/workspace:cached
      - backend-node-modules:/workspace/backend/node_modules
    working_dir: /workspace/backend
    command: >
      sh -c "
        npm install;
        npm run dev
      "
    environment:
      NODE_ENV: "development"

  frontend:
    volumes:
      - ./:/workspace:cached
      - frontend-node-modules:/workspace/frontend/node_modules
    working_dir: /workspace/frontend
    command: >
      sh -c "
        npm install;
        npm run dev
      "
    environment:
      NODE_ENV: "development"
      # VITE_TITLE / VITE_INSTANCE are already set by the base compose
      # from the --env-file; they flow through to Vite's client-side env.

volumes:
  backend-node-modules:
  frontend-node-modules:
